<ncs-config xmlns="http://tail-f.com/yang/tailf-ncs-config">
  <ha-raft>
    <enabled>true</enabled>
    <cluster-name>stockholm</cluster-name>
    <listen>
      <node-address>198.51.100.1</node-address>
    </listen>
    <ssl>
      <enabled>true</enabled>
      <ca-cert-file>ha-tls/ca.crt</ca-cert-file>
      <cert-file>ha-tls/node.crt</cert-file>
      <key-file>ha-tls/node.key</key-file>
      <crl-dir>ha-tls/crls/</crl-dir>
    </ssl>
  </ha-raft>
</ncs-config>
