<ncs-config xmlns="http://tail-f.com/yang/tailf-ncs-config">
  <ncs-local-ipc>
    <!-- Disable Unix IPC to enable TCP IPC -->
    <enabled>false</enabled>
  </ncs-local-ipc>
  <ncs-ipc-address>
    <ip>127.0.0.1</ip>
    <port>4569</port>
  </ncs-ipc-address>
  <ncs-ipc-access-check>
    <enabled>true</enabled>
    <filename>./ipc-secret</filename>
  </ncs-ipc-access-check>
</ncs-config>
